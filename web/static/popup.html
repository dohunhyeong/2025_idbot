<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>업데이트 안내</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f9f9f9;
      margin: 0;
      padding: 2rem;
    }

    .popup-container {
      background-color: white;
      border-radius: 12px;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
      padding: 2rem;
      max-width: 600px;
      margin: auto;
      animation: fadeIn 0.4s ease-in-out;
    }

    h2 {
      color: #2c3e50;
      margin-top: 0;
    }

    ul {
      padding-left: 1.2rem;
    }

    li {
      margin-bottom: 1rem;
      line-height: 1.6;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="popup-container">
    <h2>📢 법정감염병 알아보기 챗봇 업데이트 안내</h2>
    <ul>
      <li>🔗 출처 URL이 간헐적으로 연결되지 않던 문제를 수정하였습니다.</li>
      <li>🪟 관련 출처 사이트가 동일 페이지에서 열리던 현상을 개선하여, 새 창에서 열리도록 조정하였습니다.</li>
      <li>💬기존의 짧고 간단한 인삿말 응답을 보완 하였으며, 질문에 대한 답변을 보다 풍부하고 자연스러운 설명이 제공되도록 개선하였습니다.
    </li>
    </ul>
  </div>
</body>
</html>
